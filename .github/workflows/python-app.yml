name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Use Python 3.14-rc (matching your alpine image)
    - name: Set up Python 3.14-rc
      uses: actions/setup-python@v4
      with:
        python-version: "3.14-rc"  # Pre-release version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-lint  # Run after tests pass

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          your-docker-username/word-analyzer:latest
          your-docker-username/word-analyzer:${{ github.sha }}
        build-args: |
          PYTHON_VERSION=3.14-rc-alpine
